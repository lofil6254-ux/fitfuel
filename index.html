<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#0a0a14">
<title>FitFuel 🏋️</title>
<link rel="icon" type="image/jpeg" href="icon.jpg">
<link rel="apple-touch-icon" href="icon.jpg">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{--bg:#0a0a14;--s1:#11111f;--s2:#17172a;--s3:#1e1e36;--ac:#c8f53a;--acd:rgba(200,245,58,.12);--bl:#3ab4f5;--bld:rgba(58,180,245,.12);--pk:#f53a8a;--pkd:rgba(245,58,138,.12);--or:#f5933a;--ord:rgba(245,147,58,.12);--gd:#ffd700;--gdd:rgba(255,215,0,.13);--tx:#eeeef8;--mt:#5a5a7a;--br:#1e1e38;--r:13px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:system-ui,-apple-system,sans-serif;font-size:15px}
input,select,button{font-family:inherit;font-size:inherit}
.page{position:fixed;inset:0;overflow-y:auto;display:none;flex-direction:column;padding-bottom:72px}
.page.on{display:flex}
.wrap{width:100%;max-width:500px;margin:0 auto;padding:0 14px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 20px;border-radius:50px;border:none;cursor:pointer;font-size:14px;font-weight:700;transition:transform .15s}
.btn:active{transform:scale(.96)}
.bp{background:linear-gradient(135deg,var(--ac),#8ed010);color:#0a0a14}
.bo{background:transparent;border:1.5px solid var(--br);color:var(--mt)}
.bo:hover,.bo:focus{border-color:var(--ac);color:var(--ac)}
.bw{width:100%}
.bdg{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.bg{background:var(--acd);color:var(--ac)}.bb{background:var(--bld);color:var(--bl)}
.bpk{background:var(--pkd);color:var(--pk)}.bor{background:var(--ord);color:var(--or)}.bgd{background:var(--gdd);color:var(--gd)}
.card{background:var(--s2);border:1px solid var(--br);border-radius:var(--r);padding:14px;margin-bottom:10px}
.tag{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--mt)}
.mt{color:var(--mt)}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-70px);background:var(--s2);border:1.5px solid var(--ac);color:var(--ac);padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;z-index:9999;transition:transform .3s;white-space:nowrap;pointer-events:none;max-width:92vw;text-align:center}
.toast.on{transform:translateX(-50%) translateY(0)}

/* PRAYER FIX */
.ptcard{background:linear-gradient(135deg,#130f20,#1a1030);border:1px solid rgba(255,215,0,.2);border-radius:14px;padding:12px 14px;margin-bottom:12px}
.ptrow{display:flex;gap:5px;margin-top:8px}
.ptime{flex:1;background:rgba(0,0,0,.35);border-radius:8px;padding:6px 3px;text-align:center;border:1px solid transparent;transition:all 0.3s}
.ptime-v{font-size:14px;font-weight:900;color:var(--gd);font-variant-numeric:tabular-nums}
.ptime-l{font-size:9px;color:var(--mt);font-weight:700;margin-top:1px}
.ptime.nx{border-color:var(--gd);background:var(--gdd)}
.ptcnt{font-size:12px;color:var(--gd);font-weight:700;text-align:center;margin-top:9px}

/* SPLASH/SETUP/NAV (Keeping your original styling) */
#pg-splash{align-items:center;justify-content:center;text-align:center;padding:40px 20px}
.logo{font-size:68px;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,var(--ac),var(--bl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:var(--s1);border-top:1px solid var(--br);display:flex;z-index:300;padding:6px 0}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px;border:none;background:transparent;color:var(--mt);transition:color .18s}
.ni.on{color:var(--ac)}
.ni-ic{font-size:21px}.ni-lb{font-size:10px;font-weight:700}

/* Calories/Hero Ring */
.hero{background:linear-gradient(135deg,var(--s3),var(--s2));border:1px solid var(--br);border-radius:16px;padding:16px;margin-bottom:12px}
.ringwrap{display:flex;align-items:center;gap:14px;margin-top:8px}
.rsvg{width:78px;height:78px;flex-shrink:0}
.rbg2{fill:none;stroke:var(--br);stroke-width:8}
.rfl{fill:none;stroke:var(--ac);stroke-width:8;stroke-linecap:round;stroke-dasharray:220;stroke-dashoffset:220;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset 1.2s ease}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- PAGE: SPLASH -->
<div class="page on" id="pg-splash">
    <div class="logo">FITFUEL</div>
    <div style="font-size:11px;color:var(--mt);letter-spacing:2px;margin:24px 0">NUTRITION · RAMADAN</div>
    <button class="btn bp" style="padding:15px 52px" onclick="startApp()">ابدأ 🚀</button>
</div>

<!-- PAGE: SETUP (Simplified for this version) -->
<div class="page" id="pg-setup">
    <div class="wrap" style="padding-top:50px">
        <h2 style="margin-bottom:10px">معلوماتك</h2>
        <input class="fi" id="i-nm" type="text" placeholder="الاسم" style="width:100%;margin-bottom:10px;padding:12px">
        <input class="fi" id="i-wt" type="number" placeholder="الوزن (كغ)" style="width:100%;margin-bottom:20px;padding:12px">
        <button class="btn bp bw" onclick="finishSetup()">ابدأ الرحلة 🚀</button>
    </div>
</div>

<!-- PAGE: MAIN APP -->
<div class="page" id="pg-main">
    <div class="wrap" style="padding-top:16px">
        
        <!-- PRAYER CARD -->
        <div class="ptcard" id="ptcard">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <div class="tag">أوقات الصلاة - الدار البيضاء</div>
                <div class="bdg bgd" id="pt-badge">--:--</div>
            </div>
            <div class="ptrow">
                <div class="ptime" id="pt-fajr-box"><div class="ptime-v" id="pt-fajr">--:--</div><div class="ptime-l">الفجر</div></div>
                <div class="ptime" id="pt-maghrib-box"><div class="ptime-v" id="pt-maghrib">--:--</div><div class="ptime-l">الإفطار</div></div>
                <div class="ptime" id="pt-isha-box"><div class="ptime-v" id="pt-isha">--:--</div><div class="ptime-l">العشاء</div></div>
            </div>
            <div class="ptcnt" id="pt-countdown">جارِ الحساب...</div>
        </div>

        <!-- HERO CARD (Calories) -->
        <div class="hero">
            <div style="font-size:11px;color:var(--mt)">مرحباً، <span id="hm-nm">--</span></div>
            <div class="ringwrap">
                <div style="position:relative">
                    <svg class="rsvg" viewBox="0 0 90 90">
                        <circle class="rbg2" cx="45" cy="45" r="35"/>
                        <circle class="rfl" id="rfl" cx="45" cy="45" r="35" style="stroke-dashoffset: 220;"/>
                    </svg>
                    <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
                        <div style="font-size:15px;font-weight:900;color:var(--ac)" id="cur-cal">0</div>
                        <div style="font-size:9px;color:var(--mt)" id="tar-cal">/2200</div>
                    </div>
                </div>
                <div style="flex:1">
                    <div style="font-size:13px;font-weight:800">الهدف اليومي</div>
                    <div style="font-size:11px;color:var(--mt);margin-top:4px">بروتين: 140g</div>
                    <div style="font-size:11px;color:var(--mt)">كارب: 250g</div>
                </div>
            </div>
        </div>

        <!-- QUICK LOG -->
        <div class="card">
            <div style="font-size:12px;font-weight:700;margin-bottom:8px">تسجيل سريع</div>
            <div style="display:flex;gap:8px">
                <input class="fi" id="log-nm" placeholder="الوجبة" style="flex:1;padding:8px">
                <input class="fi" id="log-cal" type="number" placeholder="kcal" style="width:70px;padding:8px">
                <button class="btn bp" onclick="logFood()" style="padding:8px 12px">+</button>
            </div>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bnav">
        <button class="ni on" onclick="showTab('home')"><span class="ni-ic">🏠</span><span class="ni-lb">الرئيسية</span></button>
        <button class="ni" onclick="showTab('workout')"><span class="ni-ic">🏋️</span><span class="ni-lb">التمارين</span></button>
        <button class="ni" onclick="showTab('meals')"><span class="ni-ic">🥗</span><span class="ni-lb">الوجبات</span></button>
    </nav>
</div>

<script>
// ============================================================
// STATE & STORAGE
// ============================================================
let P = JSON.parse(localStorage.getItem('ff_data') || '{}');
let log = JSON.parse(localStorage.getItem('ff_log') || '{"cal":0}');

function save() {
    localStorage.setItem('ff_data', JSON.stringify(P));
    localStorage.setItem('ff_log', JSON.stringify(log));
}

// ============================================================
// PRAYER CLOCK ENGINE (Mathematical & Offline)
// ============================================================
const DEG = Math.PI / 180;
function fixH(h) { return h - 24 * Math.floor(h / 24); }

function getPrayerTimes() {
    const lat = 33.57; // Casablanca
    const lng = -7.58;
    const date = new Date();
    const dayOfYear = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 86400000);
    const gamma = 2 * Math.PI / 365 * (dayOfYear - 1 + (date.getHours() - 12) / 24);
    const eqtime = 229.18 * (0.000075 + 0.001868 * Math.cos(gamma) - 0.032077 * Math.sin(gamma) - 0.014615 * Math.cos(2 * gamma) - 0.040849 * Math.sin(2 * gamma));
    const decl = 0.006918 - 0.399912 * Math.cos(gamma) + 0.070257 * Math.sin(gamma) - 0.006758 * Math.cos(2 * gamma) + 0.000907 * Math.sin(2 * gamma);
    const tzOffset = -date.getTimezoneOffset() / 60;
    const noon = 12 - (lng / 15) + tzOffset - (eqtime / 60);

    const getHA = (angle) => {
        const v = (-Math.sin(angle * DEG) - Math.sin(lat * DEG) * Math.sin(decl)) / (Math.cos(lat * DEG) * Math.cos(decl));
        return v < -1 || v > 1 ? null : Math.acos(v) / (15 * DEG);
    };

    const toTime = (hrs) => {
        const h = Math.floor(fixH(hrs));
        const m = Math.round((fixH(hrs) - h) * 60);
        return String(h).padStart(2,'0') + ":" + String(m).padStart(2,'0');
    };

    return {
        fajr: toTime(noon - getHA(18)),
        maghrib: toTime(noon + getHA(0.833)),
        isha: toTime(noon + getHA(17))
    };
}

function updateClock() {
    const pt = getPrayerTimes();
    document.getElementById('pt-fajr').textContent = pt.fajr;
    document.getElementById('pt-maghrib').textContent = pt.maghrib;
    document.getElementById('pt-isha').textContent = pt.isha;

    const now = new Date();
    const nowSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
    const t2s = (t) => { const [h,m] = t.split(':').map(Number); return h*3600 + m*60; };

    const targets = [
        { name: "الفجر", sec: t2s(pt.fajr), id: 'pt-fajr-box' },
        { name: "الإفطار", sec: t2s(pt.maghrib), id: 'pt-maghrib-box' },
        { name: "العشاء", sec: t2s(pt.isha), id: 'pt-isha-box' }
    ];

    let next = null;
    document.querySelectorAll('.ptime').forEach(el => el.classList.remove('nx'));
    for (let t of targets) { if (t.sec > nowSec) { next = t; break; } }

    if (next) {
        document.getElementById(next.id).classList.add('nx');
        const diff = next.sec - nowSec;
        const h = Math.floor(diff / 3600), m = Math.floor((diff % 3600) / 60), s = diff % 60;
        document.getElementById('pt-badge').textContent = `${h}h ${m}m`;
        document.getElementById('pt-countdown').textContent = `يتبقى لـ ${next.name}: ${h}س ${m}د ${s}ث`;
    } else {
        document.getElementById('pt-badge').textContent = "انتهى اليوم";
        document.getElementById('pt-countdown').textContent = "تقبل الله صيامكم";
    }
}

// ============================================================
// APP LOGIC
// ============================================================
function finishSetup() {
    P.name = document.getElementById('i-nm').value;
    P.weight = document.getElementById('i-wt').value;
    save();
    location.reload();
}

function startApp() {
    document.getElementById('pg-splash').classList.remove('on');
    if (!P.name) {
        document.getElementById('pg-setup').classList.add('on');
    } else {
        document.getElementById('pg-main').classList.add('on');
        document.getElementById('hm-nm').textContent = P.name;
        updateUI();
        updateClock();
        setInterval(updateClock, 1000);
    }
}

function logFood() {
    const cal = parseInt(document.getElementById('log-cal').value);
    if (cal > 0) {
        log.cal += cal;
        save();
        updateUI();
        document.getElementById('log-cal').value = '';
        document.getElementById('log-nm').value = '';
    }
}

function updateUI() {
    const target = 2200;
    document.getElementById('cur-cal').textContent = log.cal;
    document.getElementById('tar-cal').textContent = "/" + target;
    const pct = Math.min(log.cal / target, 1);
    document.getElementById('rfl').style.strokeDashoffset = 220 - (pct * 220);
}

// AUTO UPDATE SCRIPT
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js?v=4').then(reg => {
      reg.onupdatefound = () => {
        const installingWorker = reg.installing;
        installingWorker.onstatechange = () => {
          if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
            window.location.reload();
          }
        };
      };
    });
  });
}
</script>
</body>
</html>

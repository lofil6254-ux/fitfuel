*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:system-ui,-apple-system,sans-serif;font-size:15px}
input,select,button{font-family:inherit;font-size:inherit}
.page{position:fixed;inset:0;overflow-y:auto;display:none;flex-direction:column;padding-bottom:72px}
.page.on{display:flex}
.wrap{width:100%;max-width:500px;margin:0 auto;padding:0 14px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 20px;border-radius:50px;border:none;cursor:pointer;font-size:14px;font-weight:700;transition:transform .15s}
.btn:active{transform:scale(.96)}
.bp{background:linear-gradient(135deg,var(--ac),#8ed010);color:#0a0a14}
.bo{background:transparent;border:1.5px solid var(--br);color:var(--mt)}
.bo:hover,.bo:focus{border-color:var(--ac);color:var(--ac)}
.bw{width:100%}
.bdg{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.bg{background:var(--acd);color:var(--ac)}.bb{background:var(--bld);color:var(--bl)}

.card{background:var(--s2);border:1px solid var(--br);border-radius:var(--r);padding:14px;margin-bottom:10px}
.tag{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--mt)}
.mt{color:var(--mt)}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-70px);background:var(--s2);border:1.5px solid var(--ac);color:var(--ac);padding:8px 16px;border-radius:50px;font-size:13px;font-weight:700;z-index:9999;transition:transform .3s;white-space:nowrap;pointer-events:none;max-width:92vw;text-align:center}

.savfl{position:fixed;bottom:78px;right:14px;background:var(--acd);border:1px solid var(--ac);color:var(--ac);padding:4px 10px;border-radius:50px;font-size:10px;font-weight:700;z-index:400;opacity:0;transition:opacity .3s;pointer-events:none}

.savfl.on{opacity:1}
.rtbar{position:fixed;bottom:74px;left:50%;transform:translateX(-50%);background:var(--s3);border:2px solid var(--bl);border-radius:50px;padding:7px 16px;font-size:13px;font-weight:800;color:var(--bl);z-index:400;display:none;align-items:center;gap:7px;cursor:pointer}

// ============================================================
// THE FIXED CLOCK ENGINE (Morocco Accurate)
// ============================================================
const DEG = Math.PI / 180;
function fixH(h) { return h - 24 * Math.floor(h / 24); }

function calculatePrayerTimes() {
    const lat = 33.57; // Casablanca
    const lng = -7.58;
    const date = new Date();
    const dayOfYear = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 86400000);
    const gamma = 2 * Math.PI / 365 * (dayOfYear - 1 + (date.getHours() - 12) / 24);
    const eqtime = 229.18 * (0.000075 + 0.001868 * Math.cos(gamma) - 0.032077 * Math.sin(gamma) - 0.014615 * Math.cos(2 * gamma) - 0.040849 * Math.sin(2 * gamma));
    const decl = 0.006918 - 0.399912 * Math.cos(gamma) + 0.070257 * Math.sin(gamma) - 0.006758 * Math.cos(2 * gamma) + 0.000907 * Math.sin(2 * gamma);
    const tzOffset = -date.getTimezoneOffset() / 60;
    const noon = 12 - (lng / 15) + tzOffset - (eqtime / 60);

    const getHA = (angle) => {
        const v = (-Math.sin(angle * DEG) - Math.sin(lat * DEG) * Math.sin(decl)) / (Math.cos(lat * DEG) * Math.cos(decl));
        return v < -1 || v > 1 ? null : Math.acos(v) / (15 * DEG);
    };

    const toT = (hrs) => {
        const h = Math.floor(fixH(hrs));
        const m = Math.round((fixH(hrs) - h) * 60);
        return String(h).padStart(2,'0') + ":" + String(m).padStart(2,'0');
    };

    return { fajr: toT(noon - getHA(18)), maghrib: toT(noon + getHA(0.833)), isha: toT(noon + getHA(17)) };
}

function updateLiveClock() {
    const pt = calculatePrayerTimes();
    document.getElementById('pt-fajr').textContent = pt.fajr;
    document.getElementById('pt-maghrib').textContent = pt.maghrib;
    document.getElementById('pt-isha').textContent = pt.isha;

    const now = new Date();
    const nowSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
    const t2s = (t) => { const [h,m] = t.split(':').map(Number); return h*3600 + m*60; };

    const targets = [
        { name: "الفجر", sec: t2s(pt.fajr), id: 'pt-fajr-box' },
        { name: "الإفطار", sec: t2s(pt.maghrib), id: 'pt-maghrib-box' },
        { name: "العشاء", sec: t2s(pt.isha), id: 'pt-isha-box' }
    ];

    let next = null;
    document.querySelectorAll('.ptime').forEach(el => el.classList.remove('nx'));
    for (let t of targets) { if (t.sec > nowSec) { next = t; break; } }

    if (next) {
        document.getElementById(next.id).classList.add('nx');
        const diff = next.sec - nowSec;
        const h = Math.floor(diff / 3600), m = Math.floor((diff % 3600) / 60), s = diff % 60;
        document.getElementById('pt-badge').textContent = `${h}h ${m}m`;
        document.getElementById('ptcnt').textContent = `يتبقى لـ ${next.name}: ${h}س ${m}د ${s}ث`;
    }
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js?v=final').then(reg => {
      reg.onupdatefound = () => {
        const installingWorker = reg.installing;
        installingWorker.onstatechange = () => {
          if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
            window.location.reload();
          }
        };
      };
    });
  });
}
</script>
